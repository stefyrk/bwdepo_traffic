<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>South West Traffic Monitor</title>

<link rel="stylesheet"
href="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#map {
    width: 100%;
    height: 100%;
}

.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: rgba(255,255,255,0.95);
    padding: 12px;
    border-radius: 6px;
    font-weight: bold;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="panel">
    South West Traffic Monitor<br>
    M4 | M5 | A30 | A38 | A303
</div>

<div id="map"></div>

<script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps-web.min.js"></script>

<script>

// Replace with your TomTom API key
const apiKey = "6lm9hE1rwlSfkwyKV5cDglVa3d4LSRpT";

// Best view for Bridgwater transport operations
const centre = [-3.15, 51.15];

const map = tt.map({
    key: apiKey,
    container: 'map',
    center: centre,
    zoom: 7,
    dragPan: true
});

map.addControl(new tt.NavigationControl());

map.on('load', () => {

    // Live Traffic Flow Layer
    map.addTier(
        new tt.TrafficFlowTilesTier().setVisibility(true)
    );

});

// Keep map centred every 30 seconds
setInterval(() => {

    map.flyTo({
        center: centre,
        zoom: 7,
        speed: 0.5
    });

}, 30000);

// Full page refresh every minute
setInterval(() => {

    location.reload();

}, 60000);

</script>

</body>
</html>
