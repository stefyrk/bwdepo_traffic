<!DOCTYPE html>
<html>
<head>
<title>South West Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
html,body,#map{
    height:100%;
    margin:0;
}
</style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([50.95,-3.45],8);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}).addTo(map);

</script>

</body>
</html>
