<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>South West Traffic Monitor</title>

<link rel="stylesheet"
href="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps.css"/>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}

#map {
    width: 100%;
    height: 100%;
}

.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: white;
    padding: 10px;
    border-radius: 5px;
    font-family: Arial;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="panel">
South West Traffic Monitor<br>
M4 | M5 | A30 | A38 | A303
</div>

<div id="map"></div>

<script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps-web.min.js"></script>

<script>

const map = tt.map({
    key: '6lm9hE1rwlSfkwyKV5cDglVa3d4LSRpT',
    container: 'map',
    center: [-3.15, 51.15],
    zoom: 7
});

map.addControl(new tt.NavigationControl());

// Refresh page every minute
setInterval(() => {
    location.reload();
}, 60000);

</script>

</body>
</html>
