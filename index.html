<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>South West Traffic Monitor</title>

<link href="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps.css" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100%;
}

.panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: white;
    padding: 10px;
    border-radius: 5px;
    font-family: Arial;
    font-weight: bold;
}
</style>

<script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps-web.min.js"></script>

</head>

<body>

<div class="panel">
South West Traffic Monitor<br>
M4 | M5 | A30 | A38 | A303
</div>

<div id="map"></div>

<script>

const centre = [-3.45, 50.95];

const map = tt.map({
    key: '6lm9hE1rwlSfkwyKV5cDglVa3d4LSRpT',
    container: 'map',
    center: centre,
    zoom: 8
});

map.addControl(new tt.NavigationControl());

map.on('load', function () {

    map.addTier(new tt.TrafficFlowTilesTier().setVisibility(true));

});

setInterval(() => {

    map.jumpTo({
        center: centre,
        zoom: 8
    });

}, 30000);

</script>

</body>
</html>
